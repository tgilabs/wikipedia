backend:
  name: github
  repo: tgilabs/wikipedia
  branch: Production
  # base_url: https://your-auth-worker.workers.dev
  # auth_endpoint: /auth

# For local development without OAuth, uncomment below:
# backend:
#   name: test-repo

# Publish mode: editorial workflow for content review before publishing
publish_mode: editorial_workflow

# Media files configuration
media_folder: "static/img"
public_folder: "/img"

# Collections define the structure of your content
collections:
  # Community Documentation
  - name: "community_docs"
    label: "Community"
    label_singular: "Community Doc"
    folder: "docs/community"
    create: true
    nested:
      depth: 100
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Sidebar Position"
        name: "sidebar_position"
        widget: "number"
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"

  # Gaming Documentation - Roblox
  - name: "gaming_roblox"
    label: "Gaming → Roblox"
    label_singular: "Roblox Doc"
    folder: "docs/gaming/roblox"
    create: true
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Sidebar Position"
        name: "sidebar_position"
        widget: "number"
        required: false
      - label: "Body"
        name: "body"
        widget: "markdown"

